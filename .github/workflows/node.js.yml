name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only run when the commit message starts with "Release: ", or when triggered manually
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'Release: ')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: npm ci

      - name: Lint PHP
        run: php -r '$it=new RecursiveIteratorIterator(new RecursiveDirectoryIterator(getcwd())); $err=0; foreach($it as $f){ if($f->isFile() && strtolower($f->getExtension())==="php"){ $p=$f->getPathname(); $out=[]; $code=0; exec("php -l ".escapeshellarg($p)." 2>&1",$out,$code); if($code!==0){ echo $p."\n".implode("\n",$out)."\n"; $err=1; } } } exit($err);'

      - name: Build and package
        run: npm run package

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Release v${{ steps.version.outputs.version }}"
          files: builds/buy-me-coffee.zip
          body: Automated release package generated from CI.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
